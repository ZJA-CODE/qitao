<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2 工单齐套优先级维护表</title>
    <style>
        :root {
            --primary: #1677ff; --primary-hover: #4096ff; --primary-bg: #e6f4ff;
            --success: #52c41a; --success-bg: #f6ffed; --success-border: #b7eb8f;
            --warning: #fa8c16; --warning-bg: #fff7e6; --warning-border: #ffd591;
            --danger: #ff4d4f; --danger-bg: #fff2f0; --danger-border: #ffccc7;
            --border: #e8e8e8; --border-light: #f0f0f0;
            --bg: #f5f7fa; --bg-white: #ffffff;
            --text: #1f1f1f; --text-secondary: #595959; --text-muted: #8c8c8c;
            --header-bg: #001529; --table-header: #fafafa; --table-hover: #f5f8ff;
            --shadow: 0 2px 8px rgba(0,0,0,0.08); --shadow-lg: 0 4px 20px rgba(0,0,0,0.12);
            --radius: 6px; --radius-sm: 4px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 13px; color: var(--text); background: var(--bg); overflow: hidden; }
        .app-header { height: 48px; background: linear-gradient(135deg, #4285f4, #667eea); border-bottom: none; display: flex; align-items: center; padding: 0 20px; flex-shrink: 0; }
        .app-title { font-size: 17px; font-weight: 600; color: #fff; letter-spacing: 1px; padding: 0; border-radius: 0; background: transparent; text-shadow: none; }
        .tab-bar { display: flex; align-items: center; gap: 4px; margin-left: 16px; overflow-x: auto; flex: 1; padding: 4px 0; }
        .tab-bar::-webkit-scrollbar { height: 0; }
        .tab-item { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 14px; font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.2s; background: rgba(66, 133, 244, 0.08); color: #888; border: 1px solid transparent; }
        .tab-item:hover { background: rgba(66, 133, 244, 0.15); color: #4285f4; }
        .tab-item.active { background: #4285f4; color: #fff; border-color: #4285f4; }
        .tab-close { width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; line-height: 1; opacity: 0.6; transition: all 0.15s; }
        .tab-close:hover { opacity: 1; background: rgba(0,0,0,0.15); }
        .tab-item.active .tab-close { opacity: 0.8; }
        .tab-item.active .tab-close:hover { opacity: 1; background: rgba(255,255,255,0.2); }
        .page-container { height: calc(100vh - 48px); display: flex; flex-direction: column; overflow: hidden; }
        .toolbar-page-title { font-size: 15px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
        .toolbar-page-title::before { content: ''; width: 3px; height: 18px; background: var(--primary); border-radius: 2px; }
        .unified-toolbar { padding: 10px 20px; background: var(--bg-white); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .toolbar-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .toolbar-actions { display: flex; gap: 6px; margin-left: auto; }
        .toolbar-query { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--bg); border-radius: var(--radius); margin-top: 8px; width: 100%; flex-wrap: wrap; }
        .toolbar-query .query-item { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; }
        .toolbar-query .query-item input,
        .toolbar-query .query-item select { height: 28px; min-width: 110px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 6px; font-size: 12px; }
        .toolbar-query .query-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
        .toolbar-query .query-label.required::after { content: " *"; color: var(--danger); }
        .stat-bar { padding: 8px 20px; background: var(--bg-white); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; font-size: 12px; color: var(--text-muted); }
        .btn { padding: 6px 16px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-white); color: var(--text); height: 32px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-weight: 500; white-space: nowrap; transition: all 0.2s; }
        .btn:hover { border-color: var(--primary); color: var(--primary); }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); color: white; }
        .btn-sm { height: 26px; padding: 4px 10px; font-size: 12px; }
        .table-container { flex: 1; min-height: 0; padding: 16px 20px; display: flex; flex-direction: column; overflow: hidden; }
        .table-wrapper { flex: 1; min-height: 0; background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow); }
        .table-scroll { flex: 1; min-height: 0; overflow: auto; }
        .data-table { font-size: 13px; border-collapse: separate; border-spacing: 0; width: 100%; min-width: max-content; }
        .data-table th, .data-table td { padding: 10px 12px; border: 1px solid var(--border); text-align: left; white-space: nowrap; }
        .data-table thead th { position: sticky; top: 0; z-index: 11; font-weight: 600; border-bottom: 1px solid var(--border); background: var(--table-header); font-size: 12px; }
        .data-table tbody tr:hover td { background: var(--table-hover); }
        .col-check { width: 40px; text-align: center; position: sticky; left: 0; z-index: 6; background: var(--table-header); }
        .data-table thead th.col-check { z-index: 14; }
        .col-check input { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
        .col-right-sticky { position: sticky; right: 0; z-index: 7; background: var(--bg-white); border-left: 1px solid var(--border); }
        .data-table thead th.col-right-sticky { z-index: 14; background: var(--table-header); }
        .th-sort { cursor: pointer; user-select: none; }
        .th-sort:hover { background: var(--primary-bg); }
        .sort-icon { font-size: 10px; margin-left: 4px; opacity: 0.4; }
        .th-sort.asc .sort-icon, .th-sort.desc .sort-icon { opacity: 1; color: var(--primary); }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
        .badge-success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
        .badge-danger { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-border); }
        .link { color: var(--primary); cursor: pointer; text-decoration: none; font-weight: 500; }
        .link:hover { text-decoration: underline; }
        .table-footer { height: 40px; padding: 0 16px; background: var(--bg-white); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 12px; flex-shrink: 0; color: var(--text-secondary); }
        .pagination { display: flex; align-items: center; gap: 8px; }
        .page-info { padding: 0 8px; }
        .toast { position: fixed; top: 64px; right: 20px; padding: 10px 16px; background: var(--bg-white); border-radius: var(--radius); box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 8px; z-index: 2000; font-size: 13px; transform: translateX(120%); transition: transform 0.25s ease; }
        .toast.show { transform: translate(0); }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }
        .toast-icon { font-size: 16px; }
        .toast.success .toast-icon { color: var(--success); }
        .toast.error .toast-icon { color: var(--danger); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1000; }
        .modal-overlay.show { display: block; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--bg-white); border-radius: 8px; box-shadow: var(--shadow-lg); z-index: 1001; max-height: 85vh; flex-direction: column; overflow: hidden; width: 850px; }
        .modal.show { display: flex; }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: var(--bg); }
        .modal-header h3 { margin: 0; font-size: 14px; font-weight: 600; }
        .modal-close { width: 28px; height: 28px; border: none; background: transparent; font-size: 20px; color: var(--text-muted); cursor: pointer; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--border-light); color: var(--text); }
        .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; min-height: 0; }
        .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: var(--bg); }
        .footer-actions { display: flex; gap: 8px; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>
    <div class="toast" id="toast"><span class="toast-icon">✓</span><span class="toast-message"></span></div>
    <header class="app-header">
        <div class="app-title">工单齐套管理系统</div>
        <div class="tab-bar"></div>
    </header>
    <div class="page-container">
        <div class="unified-toolbar">
            <div class="toolbar-row">
                <span class="toolbar-page-title">C2 工单优先级维护</span>
                <div class="toolbar-actions">
                    <button class="btn btn-sm btn-primary" onclick="exportData()">导出</button>
                </div>
            </div>
            <div class="toolbar-query">
                <div class="query-item"><span class="query-label" style="color:var(--danger);">组织 *</span><select id="qOrgName"><option value="">请选择</option><option>深圳工厂</option><option>上海工厂</option><option>北京工厂</option><option>成都工厂</option></select></div>
                <div class="query-item"><span class="query-label">工单号</span><input type="text" id="qWorkOrderNo" placeholder="多条件逗号分隔"></div>
                <div class="query-item"><span class="query-label">料号</span><input type="text" id="qMaterialCode" placeholder="多条件逗号分隔"></div>
                <div class="query-item"><span class="query-label">订单编号</span><input type="text" id="qOrderNo" placeholder="多条件逗号分隔"></div>
                <div class="query-item"><span class="query-label">订单类型</span><select id="qOrderType"><option value="">全部</option><option>标准订单</option><option>紧急订单</option><option>预测订单</option><option>补货订单</option></select></div>
                <div class="query-item"><span class="query-label">工单优先级</span><input type="number" id="qWorkOrderPriority" placeholder="数值" style="min-width:80px;"></div>
                <div class="query-item"><span class="query-label">要求完成日期</span><input type="date" id="qRequiredCompletionDate"></div>
                <button class="btn btn-primary btn-sm" onclick="doSearch()">查询</button>
                <button class="btn btn-sm" onclick="resetQuery()">重置</button>
            </div>
        </div>
        <div class="stat-bar">
            <span>提示：工单优先级由人工维护，优先级数值越小优先级越高（1为最高）</span>
        </div>
        <div class="table-container">
            <div class="table-wrapper">
                <div class="table-scroll">
                    <table class="data-table" id="dataTable"><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table>
                </div>
                <div class="table-footer">
                    <div>共 <strong id="totalCount">0</strong> 条记录</div>
                    <div>每页 <select id="pageSizeSelect" onchange="changePageSize()" style="height:26px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 6px;font-size:12px;"><option value="20">20</option><option value="50" selected>50</option><option value="100">100</option></select> 条</div>
                    <div class="pagination">
                        <button class="btn btn-sm" onclick="prevPage()">◀ 上一页</button>
                        <span class="page-info"><span id="currentPage">1</span> / <span id="totalPages">1</span></span>
                        <button class="btn btn-sm" onclick="nextPage()">下一页 ▶</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 自定义列 -->
    <div class="modal-overlay" id="colOverlay"></div>
    <div class="modal" id="columnModal"></div>

    <!-- 高级搜索 -->
    <div class="modal-overlay" id="advSearchOverlay" onclick="closeAdvSearch()"></div>
    <div class="modal" id="advSearchModal" style="width:600px;">
        <div class="modal-header"><h3>高级搜索</h3><button class="modal-close" onclick="closeAdvSearch()">×</button></div>
        <div class="modal-body">
            <div style="display:flex;flex-direction:column;gap:14px;">
                <div style="display:flex;align-items:center;gap:8px;"><span style="width:100px;text-align:right;font-size:13px;color:var(--text-secondary);">创建日期起</span><input type="date" id="adv_createDateFrom" style="flex:1;height:30px;border:1px solid var(--border);border-radius:4px;padding:0 8px;"></div>
                <div style="display:flex;align-items:center;gap:8px;"><span style="width:100px;text-align:right;font-size:13px;color:var(--text-secondary);">创建日期止</span><input type="date" id="adv_createDateTo" style="flex:1;height:30px;border:1px solid var(--border);border-radius:4px;padding:0 8px;"></div>
                <div style="display:flex;align-items:center;gap:8px;"><span style="width:100px;text-align:right;font-size:13px;color:var(--text-secondary);">更新日期起</span><input type="date" id="adv_updateDateFrom" style="flex:1;height:30px;border:1px solid var(--border);border-radius:4px;padding:0 8px;"></div>
                <div style="display:flex;align-items:center;gap:8px;"><span style="width:100px;text-align:right;font-size:13px;color:var(--text-secondary);">更新日期止</span><input type="date" id="adv_updateDateTo" style="flex:1;height:30px;border:1px solid var(--border);border-radius:4px;padding:0 8px;"></div>
                <div style="display:flex;align-items:center;gap:8px;"><span style="width:100px;text-align:right;font-size:13px;color:var(--text-secondary);">优先级范围</span><input type="number" id="adv_priorityMin" style="width:80px;height:30px;border:1px solid var(--border);border-radius:4px;padding:0 8px;" placeholder="最小"><span style="padding:0 8px;">-</span><input type="number" id="adv_priorityMax" style="width:80px;height:30px;border:1px solid var(--border);border-radius:4px;padding:0 8px;" placeholder="最大"></div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-sm" onclick="resetAdvSearch()">重置</button>
            <div class="footer-actions">
                <button class="btn btn-sm" onclick="closeAdvSearch()">取消</button>
                <button class="btn btn-primary btn-sm" onclick="applyAdvSearch()">搜索</button>
            </div>
        </div>
    </div>

    <script src="../../js/tab-manager.js"></script>
    <script src="../../js/column-config-transfer.js"></script>
    <script>
        var tableFields = [
            {field:'seqNo',name:'序号',visible:true,systemFixed:true},
            {field:'orgName',name:'组织',visible:true},
            {field:'workOrderNo',name:'工单号',visible:true,leftSticky:true},
            {field:'materialCode',name:'料号',visible:true},
            {field:'materialDesc',name:'物料描述',visible:true},
            {field:'orderNo',name:'订单编号',visible:true},
            {field:'orderType',name:'订单类型',visible:true},
            {field:'requiredCompletionDate',name:'要求完成日期',visible:true},
            {field:'workOrderPriority',name:'工单优先级',visible:true,editable:true},
            {field:'createdBy',name:'创建人',visible:false},
            {field:'createDate',name:'创建日期',visible:false},
            {field:'updatedBy',name:'更新人',visible:false},
            {field:'updateDate',name:'更新日期',visible:false}
        ];
        var currentColumnConfig = tableFields.map(function(f){return Object.assign({},f);});
        var allData, filteredData, currentPage, pageSize;
        var sortField = '', sortDir = '';

        function init() {
            pageSize = 50; currentPage = 1;
            generateSampleData();
            filteredData = allData.slice();
            renderTable();
        }

        function generateSampleData() {
            var orgs = ['深圳工厂','上海工厂','北京工厂','成都工厂'];
            var orderTypes = ['标准订单','紧急订单','预测订单','补货订单'];
            var statuses = ['已发料','未发料','进行中','已完工'];
            var users = ['张三','李四','王五','赵六'];
            var materials = [
                {code:'MAT-1001',desc:'芯片封装-QFP128'},
                {code:'MAT-1002',desc:'芯片封装-BGA256'},
                {code:'MAT-2001',desc:'PCB主板-8层'},
                {code:'MAT-2003',desc:'电源模块-DCDC'},
                {code:'MAT-3001',desc:'连接器-HDMI'}
            ];

            allData = [];
            for (var i = 1; i <= 25; i++) {
                var now = new Date();
                var reqDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() + Math.floor(Math.random()*30)+1);
                var cd = new Date(now.getFullYear(), now.getMonth()-Math.floor(Math.random()*2), Math.floor(Math.random()*28)+1);
                var mat = materials[Math.floor(Math.random()*materials.length)];

                allData.push({
                    seqNo: i,
                    workOrderNo: 'WO' + String(20260000 + i).padStart(8,'0'),
                    orgName: orgs[Math.floor(Math.random()*orgs.length)],
                    orderNo: 'ORD' + String(Math.floor(Math.random()*900000)+100000),
                    orderType: orderTypes[Math.floor(Math.random()*orderTypes.length)],
                    materialCode: mat.code,
                    materialDesc: mat.desc,
                    orderQty: Math.floor(Math.random()*500) + 50,
                    requiredCompletionDate: reqDate.toISOString().split('T')[0],
                    workOrderStatus: statuses[Math.floor(Math.random()*statuses.length)],
                    workOrderPriority: Math.floor(Math.random()*10) + 1,
                    createdBy: users[Math.floor(Math.random()*users.length)],
                    createDate: cd.toISOString().split('T')[0],
                    updatedBy: users[Math.floor(Math.random()*users.length)],
                    updateDate: cd.toISOString().split('T')[0]
                });
            }
            allData.sort(function(a,b){ return a.workOrderPriority - b.workOrderPriority; });
        }

        function sortBy(field) {
            if (sortField === field) {
                if (sortDir === 'asc') sortDir = 'desc';
                else if (sortDir === 'desc') { sortDir = ''; sortField = ''; }
            } else { sortField = field; sortDir = 'asc'; }
            if (sortField) {
                filteredData.sort(function(a, b) {
                    var va = a[sortField], vb = b[sortField];
                    if (va == null) va = ''; if (vb == null) vb = '';
                    var na = parseFloat(va), nb = parseFloat(vb);
                    if (!isNaN(na) && !isNaN(nb)) return sortDir === 'asc' ? na - nb : nb - na;
                    va = String(va); vb = String(vb);
                    if (va < vb) return sortDir === 'asc' ? -1 : 1;
                    if (va > vb) return sortDir === 'asc' ? 1 : -1;
                    return 0;
                });
            }
            currentPage = 1; renderTable();
        }

        function buildHeaderHtml() {
            var h = '<tr><th class="col-check"><input type="checkbox" onchange="toggleAll(this)"></th>';
            currentColumnConfig.forEach(function(c) {
                if (!c.visible) return;
                var cls = c.leftSticky ? 'col-left-sticky' : (c.rightSticky ? 'col-right-sticky' : '');
                var sortCls = sortField === c.field ? (' th-sort ' + sortDir) : ' th-sort';
                var icon = sortField === c.field ? (sortDir === 'asc' ? '▲' : '▼') : '▲';
                h += '<th class="'+cls+sortCls+'" onclick="sortBy(\''+c.field+'\')">'+c.name+'<span class="sort-icon">'+icon+'</span></th>';
            });
            return h + '</tr>';
        }

        function buildBodyHtml() {
            var s = (currentPage-1)*pageSize, e = Math.min(s+pageSize, filteredData.length);
            var h = '';
            for (var i = s; i < e; i++) {
                var d = filteredData[i];
                h += '<tr data-idx="'+i+'"><td class="col-check"><input type="checkbox"></td>';
                currentColumnConfig.forEach(function(c) {
                    if (!c.visible) return;
                    var tc = c.leftSticky ? 'col-left-sticky' : (c.rightSticky ? 'col-right-sticky' : '');
                    var v = d[c.field];
                    if (c.editable && c.field === 'workOrderPriority') {
                        h += '<td class="'+tc+'"><input class="inline-input" type="number" value="'+(v||'')+'" onchange="updateField('+i+',\'workOrderPriority\',this.value)" style="width:60px;height:26px;border:1px solid var(--border);border-radius:4px;padding:0 6px;"></td>';
                    } else {
                        h += '<td class="'+tc+'">'+(v!==undefined && v!==null && v!==''?v:'-')+'</td>';
                    }
                });
                h += '</tr>';
            }
            return h;
        }

        function renderTable() {
            document.getElementById('tableHead').innerHTML = buildHeaderHtml();
            document.getElementById('tableBody').innerHTML = buildBodyHtml();
            document.getElementById('totalCount').textContent = filteredData.length;
            document.getElementById('totalPages').textContent = Math.ceil(filteredData.length/pageSize)||1;
            document.getElementById('currentPage').textContent = currentPage;
        }

        function updateField(i,f,v) {
            if(filteredData[i]) filteredData[i][f]=v;
            if(allData[i]) allData[i][f]=v;
        }

        function doSearch() {
            var org = document.getElementById('qOrgName').value;
            var wo = document.getElementById('qWorkOrderNo').value.trim();
            var mat = document.getElementById('qMaterialCode').value.trim();
            var ord = document.getElementById('qOrderNo').value.trim();
            var ot = document.getElementById('qOrderType').value;
            var pr = document.getElementById('qWorkOrderPriority').value;
            var rcd = document.getElementById('qRequiredCompletionDate').value;

            filteredData = allData.filter(function(d) {
                if (org && d.orgName !== org) return false;
                if (wo && d.workOrderNo.indexOf(wo) === -1) return false;
                if (mat && d.materialCode.indexOf(mat) === -1) return false;
                if (ord && d.orderNo.indexOf(ord) === -1) return false;
                if (ot && d.orderType !== ot) return false;
                if (pr && String(d.workOrderPriority) !== pr) return false;
                if (rcd && d.requiredCompletionDate !== rcd) return false;
                return true;
            });
            currentPage = 1; renderTable();
            showToast('查询完成，共 ' + filteredData.length + ' 条记录', 'success');
        }

        function resetQuery() {
            document.getElementById('qOrgName').value = '';
            document.getElementById('qWorkOrderNo').value = '';
            document.getElementById('qMaterialCode').value = '';
            document.getElementById('qOrderNo').value = '';
            document.getElementById('qOrderType').value = '';
            document.getElementById('qWorkOrderPriority').value = '';
            document.getElementById('qRequiredCompletionDate').value = '';
            filteredData = allData.slice(); currentPage = 1; renderTable();
            showToast('查询条件已重置', 'success');
        }

        function changePageSize() { pageSize = parseInt(document.getElementById('pageSizeSelect').value); currentPage = 1; renderTable(); }
        function prevPage() { if (currentPage > 1) { currentPage--; renderTable(); } }
        function nextPage() { if (currentPage < Math.ceil(filteredData.length/pageSize)) { currentPage++; renderTable(); } }
        function toggleAll(cb) { document.querySelectorAll('#tableBody input[type="checkbox"]').forEach(function(c){ c.checked = cb.checked; }); }

        function exportData() {
            var vf = currentColumnConfig.filter(function(c){ return c.visible; });
            var csv = '\ufeff' + vf.map(function(c){ return c.name; }).join('\t') + '\n';
            filteredData.forEach(function(d) { csv += vf.map(function(c) { var v = d[c.field]; return v !== undefined && v !== null ? v : ''; }).join('\t') + '\n'; });
            var b = new Blob([csv], {type:'text/csv;charset=utf-8;'});
            var a = document.createElement('a'); a.href = URL.createObjectURL(b);
            a.download = '工单优先级_' + new Date().toISOString().split('T')[0] + '.csv'; a.click();
            showToast('导出成功', 'success');
        }

        function showToast(m, tp) {
            var t = document.getElementById('toast');
            t.querySelector('.toast-message').textContent = m;
            t.className = 'toast ' + (tp || 'success') + ' show';
            setTimeout(function(){ t.classList.remove('show'); }, 2500);
        }

        // 高级搜索
        function openAdvSearch() {
            document.getElementById('advSearchOverlay').classList.add('show');
            document.getElementById('advSearchModal').classList.add('show');
        }
        function closeAdvSearch() {
            document.getElementById('advSearchOverlay').classList.remove('show');
            document.getElementById('advSearchModal').classList.remove('show');
        }
        function resetAdvSearch() {
            ['adv_createDateFrom','adv_createDateTo','adv_updateDateFrom','adv_updateDateTo','adv_priorityMin','adv_priorityMax'].forEach(function(id){ document.getElementById(id).value = ''; });
        }
        function applyAdvSearch() {
            var cdf = document.getElementById('adv_createDateFrom').value;
            var cdt = document.getElementById('adv_createDateTo').value;
            var udf = document.getElementById('adv_updateDateFrom').value;
            var udt = document.getElementById('adv_updateDateTo').value;
            var pmin = document.getElementById('adv_priorityMin').value;
            var pmax = document.getElementById('adv_priorityMax').value;
            filteredData = allData.filter(function(d) {
                if (cdf && d.createDate < cdf) return false;
                if (cdt && d.createDate > cdt) return false;
                if (udf && d.updateDate < udf) return false;
                if (udt && d.updateDate > udt) return false;
                if (pmin && parseInt(d.workOrderPriority) < parseInt(pmin)) return false;
                if (pmax && parseInt(d.workOrderPriority) > parseInt(pmax)) return false;
                return true;
            });
            currentPage = 1; renderTable();
            closeAdvSearch();
            showToast('高级搜索完成，共 ' + filteredData.length + ' 条记录');
        }

        // 自定义列
        function openColumnConfig() { ColumnConfigTransfer.open(); }

        // 初始化穿梭框组件
        ColumnConfigTransfer.init(
            tableFields,
            function(newDefs) {
                currentColumnConfig = newDefs.map(function(f){ return Object.assign({},f); });
                renderTable();
            },
            function() {
                currentColumnConfig = tableFields.map(function(f){ return Object.assign({},f); });
                renderTable();
            },
            function(savedDefs) {
                currentColumnConfig = savedDefs.map(function(f){ return Object.assign({},f); });
                try { localStorage.setItem('C2_columnConfig', JSON.stringify(savedDefs)); } catch(e) {}
                renderTable();
            }
        );

        init();

        // 页签导航配置
        var TAB_NAV_CONFIG = {
            '首页': { url: '../index.html' },
            '工单齐套明细': { url: 'M1-kit-details.html' },
            '工单组件信息': { url: 'M2-wo-details.html' },
            '物料缺料明细': { url: 'M3-material-details.html' },
            '齐套规则配置': { url: 'C1-config-rules.html' },
            '工单优先级维护': { url: 'C2-priority.html' },
            '组件责任方配置': { url: 'C3-responsible-party.html' },
            '供给PO信息': { url: 'T1-po-report.html' },
            '供给PR信息': { url: 'T2-pr-info.html' },
            '供给WO信息': { url: 'wo-supply.html' },
            '齐套计算': { url: '../index.html' },
        };
        TabManager.init(TAB_NAV_CONFIG);
    </script>
</body>
</html>
