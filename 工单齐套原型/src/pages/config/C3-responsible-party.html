<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C3 组件责任方配置</title>
    <style>
        :root { --primary: #1677ff; --primary-hover: #4096ff; --primary-bg: #e6f4ff; --success: #52c41a; --success-bg: #f6ffed; --success-border: #b7eb8f; --warning: #fa8c16; --warning-bg: #fff7e6; --warning-border: #ffd591; --danger: #ff4d4f; --danger-bg: #fff2f0; --danger-border: #ffccc7; --border: #e8e8e8; --border-light: #f0f0f0; --bg: #f5f7fa; --bg-white: #ffffff; --text: #1f1f1f; --text-secondary: #595959; --text-muted: #8c8c8c; --header-bg: #001529; --table-header: #fafafa; --table-hover: #f5f8ff; --shadow: 0 2px 8px rgba(0,0,0,0.08); --shadow-lg: 0 4px 20px rgba(0,0,0,0.12); --radius: 6px; --radius-sm: 4px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 13px; color: var(--text); background: var(--bg); overflow: hidden; }
        .app-header { height: 48px; background: linear-gradient(135deg, #4285f4, #667eea); border-bottom: none; display: flex; align-items: center; padding: 0 20px; flex-shrink: 0; }
        .app-title { font-size: 17px; font-weight: 600; color: #fff; letter-spacing: 1px; padding: 0; border-radius: 0; background: transparent; text-shadow: none; }
        .tab-bar { display: flex; align-items: center; gap: 4px; margin-left: 16px; overflow-x: auto; flex: 1; padding: 4px 0; }
        .tab-bar::-webkit-scrollbar { height: 0; }
        .tab-item { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 14px; font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.2s; background: rgba(66, 133, 244, 0.08); color: #888; border: 1px solid transparent; }
        .tab-item:hover { background: rgba(66, 133, 244, 0.15); color: #4285f4; }
        .tab-item.active { background: #4285f4; color: #fff; border-color: #4285f4; }
        .tab-close { width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; line-height: 1; opacity: 0.6; transition: all 0.15s; }
        .tab-close:hover { opacity: 1; background: rgba(0,0,0,0.15); }
        .tab-item.active .tab-close { opacity: 0.8; }
        .tab-item.active .tab-close:hover { opacity: 1; background: rgba(255,255,255,0.2); }
        .page-container { height: calc(100vh - 48px); display: flex; flex-direction: column; overflow: hidden; }
        
        
        
        
        
        .page-toolbar { height: 48px; padding: 0 20px; background: var(--bg-white); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .toolbar-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .toolbar-title::before { content: ''; width: 3px; height: 18px; background: var(--primary); border-radius: 2px; }
        .toolbar-actions { display: flex; gap: 8px; margin-left: auto; }
.toolbar-page-title { font-size: 15px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
        .toolbar-page-title::before { content: ''; width: 3px; height: 18px; background: var(--primary); border-radius: 2px; }
        .unified-toolbar { padding: 10px 20px; background: var(--bg-white); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .toolbar-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        
        
        
        
        
        .toolbar-actions { display: flex; gap: 6px; margin-left: auto; }
        .toolbar-query { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--bg); border-radius: var(--radius); margin-top: 8px; width: 100%; flex-wrap: wrap; }
        .toolbar-query .query-item { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; }
        .toolbar-query .query-item input,
        .toolbar-query .query-item select { height: 28px; min-width: 110px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 6px; font-size: 12px; }
        .toolbar-query .query-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
        .toolbar-query .query-label.required::after { content: " *"; color: var(--danger); }
        .query-bar { padding: 10px 20px; background: var(--bg-white); border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 14px; align-items: center; flex-shrink: 0; }
        .query-item { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; }
        .query-item input, .query-item select { height: 30px; min-width: 130px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 8px; font-size: 13px; color: var(--text); background: var(--bg-white); }
        .query-item input:focus, .query-item select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(22,119,255,0.1); }
        .query-label { color: var(--text-secondary); white-space: nowrap; }
        .btn { padding: 6px 16px; border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-white); color: var(--text); height: 32px; display: inline-flex; align-items: center; gap: 6px; font-weight: 500; white-space: nowrap; transition: all 0.2s; }
        .btn:hover { border-color: var(--primary); color: var(--primary); }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); color: white; }
        .btn-add { background: var(--primary); border-color: var(--primary); color: white; }
        .btn-add:hover { background: var(--primary-hover); border-color: var(--primary-hover); color: white; }
        .btn-delete { background: var(--bg-white); border-color: var(--border); color: var(--text-secondary); }
        .btn-danger { background: var(--danger); border-color: var(--danger); color: white; }
        .btn-delete:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }
        .btn-sm { height: 26px; padding: 4px 10px; font-size: 12px; }
        .table-container { flex: 1; min-height: 0; padding: 16px 20px; display: flex; flex-direction: column; overflow: hidden; }
        .table-wrapper { flex: 1; min-height: 0; background: var(--bg-white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow); }
        .table-scroll { flex: 1; min-height: 0; overflow: auto; }
        .data-table { font-size: 13px; border-collapse: separate; border-spacing: 0; width: 100%; min-width: 900px; }
        .data-table th, .data-table td { padding: 8px 12px; border: 1px solid var(--border); text-align: left; white-space: nowrap; }
        .data-table thead th { position: sticky; top: 0; z-index: 10; font-weight: 600; border-bottom: 1px solid var(--border); background: var(--table-header); font-size: 12px; color: var(--text-secondary); }
        .data-table tbody tr:hover td { background: var(--table-hover); }
        .data-table tbody tr.editing td { background: #fffbef; }
        .col-check { width: 40px; text-align: center; position: sticky; left: 0; z-index: 5; background: var(--table-header); }
        .data-table thead th.col-check { z-index: 11; }
        .col-check input { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
        .col-right-sticky { position: sticky; right: 0; z-index: 5; background: var(--bg-white); border-left: 1px solid var(--border); }
        .data-table thead th.col-right-sticky { z-index: 11; background: var(--table-header); }
        .th-sort { cursor: pointer; user-select: none; }
        .th-sort:hover { background: var(--primary-bg); }
        .sort-icon { font-size: 10px; margin-left: 4px; opacity: 0.4; }
        .th-sort.asc .sort-icon, .th-sort.desc .sort-icon { opacity: 1; color: var(--primary); }
        .link { color: var(--primary); cursor: pointer; text-decoration: none; font-weight: 500; }
        .link:hover { text-decoration: underline; }
        .link-danger { color: var(--danger); cursor: pointer; }
        .link-danger:hover { text-decoration: underline; }
        .table-footer { height: 42px; padding: 0 16px; background: var(--bg-white); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 12px; flex-shrink: 0; color: var(--text-secondary); }
        .pagination { display: flex; align-items: center; gap: 8px; }
        .toast { position: fixed; top: 64px; right: 20px; padding: 10px 16px; background: var(--bg-white); border-radius: var(--radius); box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 8px; z-index: 2000; font-size: 13px; transform: translateX(120%); transition: transform 0.25s ease; }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left: 4px solid var(--success); }
        .toast-icon { font-size: 16px; }
        .toast.success .toast-icon { color: var(--success); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.45); z-index: 1000; }
        .modal-overlay.show { display: block; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--bg-white); border-radius: 8px; box-shadow: var(--shadow-lg); z-index: 1001; max-height: 90vh; flex-direction: column; overflow: hidden; min-width: 500px; }
        .modal.show { display: flex; }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: var(--bg); }
        .modal-header h3 { margin: 0; font-size: 14px; font-weight: 600; }
        .modal-close { width: 28px; height: 28px; border: none; background: transparent; font-size: 20px; color: var(--text-muted); cursor: pointer; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--border-light); color: var(--text); }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; min-height: 0; }
        .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; background: var(--bg); }
        .form-row { display: flex; gap: 16px; margin-bottom: 16px; align-items: flex-start; }
        .form-item { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .form-item label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
        .form-item input, .form-item select { height: 32px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 10px; font-size: 13px; }
        .form-item input:focus, .form-item select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(22,119,255,0.1); }
        .form-item.required label::after { content: ' *'; color: var(--danger); }
        .edit-input { height: 28px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 6px; font-size: 12px; width: 100%; }
        .edit-input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(22,119,255,0.1); }
        .edit-select { height: 28px; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0 6px; font-size: 12px; width: 100%; background: var(--bg-white); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>
    <div class="toast" id="toast"><span class="toast-icon">✓</span><span class="toast-message"></span></div>
        <header class="app-header">
        <div class="app-title">工单齐套管理系统</div>
        <div class="tab-bar"></div>
    </header>
    <div class="page-container">
        <div class="unified-toolbar">            <div class="toolbar-row">                <span class="toolbar-page-title">C3 组件责任方配置</span>                <div class="toolbar-actions">                    <button class="btn btn-sm btn-primary" onclick="doAdd()">新增</button>                    <button class="btn btn-sm btn-danger" onclick="doDelete()">删除</button>                    <button class="btn btn-sm btn-primary" onclick="exportData()">导出</button>                </div>            </div>            <div class="toolbar-query">                <div class="query-item"><span class="query-label">零部件类别</span><select id="q_componentCategory"><option value="">全部</option><option>电子元器件</option><option>结构件</option><option>紧固件</option><option>包装材料</option><option>化学品</option></select>
            </div>                <div class="query-item"><span class="query-label">组件类别</span><select id="q_componentType"><option value="">全部</option><option>IC类</option><option>阻容类</option><option>连接器</option><option>PCB板</option><option>结构件</option></select></div>                <div class="query-item"><span class="query-label">组件责任人</span><input type="text" id="q_componentResponsibleParty" placeholder="输入责任人名称"></div>                <button class="btn btn-primary btn-sm" onclick="doSearch()">查询</button>                <button class="btn btn-sm" onclick="resetQuery()">重置</button>            </div>        </div><div class="table-container">
            <div class="table-wrapper">
                <div class="table-scroll">
                    <table class="data-table">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                <div class="table-footer">
                    <div>共 <strong id="totalCount">0</strong> 条记录</div>
                    <div class="pagination">
                        <button class="btn btn-sm" onclick="prevPage()">◀ 上一页</button>
                        <span><span id="currentPage">1</span> / <span id="totalPages">1</span></span>
                        <button class="btn btn-sm" onclick="nextPage()">下一页 ▶</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增/编辑弹窗 -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
    <div class="modal" id="editModal">
        <div class="modal-header">
            <h3 id="modalTitle">新增配置</h3>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-item required">
                    <label>零部件类别</label>
                    <select id="f_componentCategory">
                        <option value="">请选择</option>
                        <option>电子元器件</option>
                        <option>结构件</option>
                        <option>紧固件</option>
                        <option>包装材料</option>
                        <option>化学品</option>
                        <option>线材</option>
                        <option>电机</option>
                        <option>传感器</option>
                    </select>
                </div>
                <div class="form-item required">
                    <label>组件类别</label>
                    <select id="f_componentType">
                        <option value="">请选择</option>
                        <option>IC类</option>
                        <option>阻容类</option>
                        <option>连接器</option>
                        <option>PCB板</option>
                        <option>结构件</option>
                        <option>螺丝螺母</option>
                        <option>纸箱</option>
                        <option>胶水</option>
                        <option>电源线</option>
                        <option>马达</option>
                        <option>温度传感器</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-item required" style="flex:2;">
                    <label>组件责任人</label>
                    <input type="text" id="f_componentResponsibleParty" placeholder="请输入责任人名称">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-sm" onclick="closeModal()">取消</button>
            <button class="btn btn-primary btn-sm" onclick="submitForm()">确定</button>
        </div>
    </div>

    <script src="../../js/tab-manager.js"></script><script src="../../js/column-config-transfer.js"></script><script>
        // C3屏幕字段定义（按照SPEC.md）
        var tableFields = [
            {field: 'componentCategory', name: '零部件类别', width: 140, queryable: true, queryType: 'SEL_2', editable: true, editableType: 'select'},
            {field: 'componentType', name: '组件类别', width: 120, queryable: true, queryType: 'SEL_2', editable: true, editableType: 'select'},
            {field: 'componentResponsibleParty', name: '组件责任人', width: 180, queryable: true, queryType: 'TXT_2', editable: true, editableType: 'text'},
            {field: 'createDate', name: '创建时间', width: 160, editable: false},
            {field: 'updateDate', name: '修改时间', width: 160, editable: false},
            {field: 'updatedBy', name: '修改人', width: 100, queryable: true, queryType: 'TXT_2', editable: false}
        ];

        var allData = [];
        var filteredData = [];
        var currentPage = 1;
        var pageSize = 50;
        var sortField = '';
        var sortDirection = '';
        var editRowIndex = null;
        var isAddNew = false;

        var categories = ['电子元器件', '结构件', '紧固件', '包装材料', '化学品', '线材', '电机', '传感器'];
        var types = ['IC类', '阻容类', '连接器', 'PCB板', '结构件', '螺丝螺母', '纸箱', '胶水', '电源线', '马达', '温度传感器'];
        var parties = ['采购部-张经理', '采购部-李经理', '采购部-王工', '供应商A-陈总', '供应商B-刘总', '客户-赵工', '内部-周工'];
        var users = ['张三', '李四', '王五', '赵六', '钱七', '孙八'];

        function formatDate(date) {
            var y = date.getFullYear();
            var m = String(date.getMonth() + 1).padStart(2, '0');
            var d = String(date.getDate()).padStart(2, '0');
            var h = String(date.getHours()).padStart(2, '0');
            var mi = String(date.getMinutes()).padStart(2, '0');
            var s = String(date.getSeconds()).padStart(2, '0');
            return y + '-' + m + '-' + d + ' ' + h + ':' + mi + ':' + s;
        }

        function generateMockData() {
            allData = [];
            for (var i = 1; i <= 80; i++) {
                var createDate = new Date();
                createDate.setDate(createDate.getDate() - Math.floor(Math.random() * 180));
                var updateDate = new Date(createDate);
                updateDate.setDate(updateDate.getDate() + Math.floor(Math.random() * 60));

                allData.push({
                    seqNo: i,
                    componentCategory: categories[Math.floor(Math.random() * categories.length)],
                    componentType: types[Math.floor(Math.random() * types.length)],
                    componentResponsibleParty: parties[Math.floor(Math.random() * parties.length)],
                    createDate: formatDate(createDate),
                    updateDate: formatDate(updateDate),
                    updatedBy: users[Math.floor(Math.random() * users.length)]
                });
            }
            filteredData = allData.slice();
        }

        function renderTableHeader() {
            var html = '<tr>';
            html += '<th class="col-check"><input type="checkbox" onchange="toggleAll(this)"></th>';
            tableFields.forEach(function(field, idx) {
                var cls = 'th-sort';
                var sortIcon = '▲';
                if (sortField === field.field) {
                    cls += ' ' + sortDirection;
                    sortIcon = sortDirection === 'asc' ? '▲' : '▼';
                }
                html += '<th class="' + cls + '" onclick="sortTable(\'' + field.field + '\')" style="width:' + (field.width || 'auto') + ';">';
                html += field.name + '<span class="sort-icon">' + sortIcon + '</span></th>';
            });
            html += '<th class="col-right-sticky">操作</th>';
            html += '</tr>';
            document.getElementById('tableHead').innerHTML = html;
        }

        function renderTableBody() {
            var start = (currentPage - 1) * pageSize;
            var end = Math.min(start + pageSize, filteredData.length);
            var html = '';

            for (var i = start; i < end; i++) {
                var row = filteredData[i];
                var isEditing = editRowIndex === i;
                html += '<tr' + (isEditing ? ' class="editing"' : '') + '>';
                html += '<td class="col-check"><input type="checkbox" data-idx="' + i + '"></td>';
                tableFields.forEach(function(field) {
                    if (isEditing && field.editable) {
                        if (field.editableType === 'select') {
                            var opts = field.field === 'componentCategory' ? categories : types;
                            html += '<td><select class="edit-select" data-field="' + field.field + '">';
                            opts.forEach(function(o) {
                                html += '<option value="' + o + '"' + (row[field.field] === o ? ' selected' : '') + '>' + o + '</option>';
                            });
                            html += '</select></td>';
                        } else {
                            html += '<td><input type="text" class="edit-input" value="' + (row[field.field] || '') + '" data-field="' + field.field + '"></td>';
                        }
                    } else {
                        html += '<td>' + (row[field.field] !== undefined && row[field.field] !== null ? row[field.field] : '') + '</td>';
                    }
                });
                html += '<td class="col-right-sticky">';
                if (isEditing) {
                    html += '<a class="link" onclick="confirmEdit(' + i + ')">保存</a> | ';
                    html += '<a class="link" onclick="cancelEdit()">取消</a>';
                } else {
                    html += '<a class="link" onclick="startEdit(' + i + ')">编辑</a> | ';
                    html += '<a class="link-danger" onclick="deleteRow(' + i + ')">删除</a>';
                }
                html += '</td></tr>';
            }
            document.getElementById('tableBody').innerHTML = html;
        }

        function renderTable() {
            renderTableHeader();
            renderTableBody();
            renderPagination();
        }

        function renderPagination() {
            document.getElementById('totalCount').textContent = filteredData.length;
            var totalPages = Math.ceil(filteredData.length / pageSize) || 1;
            document.getElementById('currentPage').textContent = currentPage;
            document.getElementById('totalPages').textContent = totalPages;
        }

        function sortTable(field) {
            if (sortField === field) {
                if (sortDirection === 'asc') {
                    sortDirection = 'desc';
                } else if (sortDirection === 'desc') {
                    sortField = '';
                    sortDirection = '';
                }
            } else {
                sortField = field;
                sortDirection = 'asc';
            }
            if (sortField) {
                filteredData.sort(function(a, b) {
                    var va = a[sortField], vb = b[sortField];
                    if (va == null) va = '';
                    if (vb == null) vb = '';
                    var na = parseFloat(va);
                    var nb = parseFloat(vb);
                    if (!isNaN(na) && !isNaN(nb)) {
                        return sortDirection === 'asc' ? na - nb : nb - na;
                    }
                    va = String(va);
                    vb = String(vb);
                    if (va < vb) return sortDirection === 'asc' ? -1 : 1;
                    if (va > vb) return sortDirection === 'asc' ? 1 : -1;
                    return 0;
                });
            }
            currentPage = 1;
            renderTable();
        }

        function doSearch() {
            var category = document.getElementById('q_componentCategory').value;
            var type = document.getElementById('q_componentType').value;
            var party = document.getElementById('q_componentResponsibleParty').value.trim();

            filteredData = allData.filter(function(item) {
                if (category && item.componentCategory !== category) return false;
                if (type && item.componentType !== type) return false;
                if (party && item.componentResponsibleParty.indexOf(party) === -1) return false;
                return true;
            });

            currentPage = 1;
            editRowIndex = null;
            renderTable();
            showToast('查询完成，共 ' + filteredData.length + ' 条记录');
        }

        function resetQuery() {
            document.getElementById('q_componentCategory').value = '';
            document.getElementById('q_componentType').value = '';
            document.getElementById('q_componentResponsibleParty').value = '';
            filteredData = allData.slice();
            currentPage = 1;
            editRowIndex = null;
            renderTable();
            showToast('查询条件已重置');
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                editRowIndex = null;
                renderTable();
            }
        }

        function nextPage() {
            var totalPages = Math.ceil(filteredData.length / pageSize);
            if (currentPage < totalPages) {
                currentPage++;
                editRowIndex = null;
                renderTable();
            }
        }

        function toggleAll(cb) {
            document.querySelectorAll('#tableBody input[type="checkbox"]').forEach(function(c) {
                c.checked = cb.checked;
            });
        }

        function startEdit(idx) {
            editRowIndex = idx;
            renderTableBody();
        }

        function cancelEdit() {
            editRowIndex = null;
            renderTableBody();
        }

        function confirmEdit(idx) {
            var row = filteredData[idx];
            var inputs = document.querySelectorAll('#tableBody tr:nth-child(' + (idx - (currentPage - 1) * pageSize + 1) + ') .edit-input, #tableBody tr:nth-child(' + (idx - (currentPage - 1) * pageSize + 1) + ') .edit-select');
            inputs.forEach(function(input) {
                var field = input.dataset.field;
                if (field) {
                    row[field] = input.value;
                }
            });
            row.updateDate = formatDate(new Date());
            row.updatedBy = '当前用户';
            editRowIndex = null;
            renderTableBody();
            showToast('修改已保存');
        }

        function deleteRow(idx) {
            if (confirm('确定要删除这条记录吗？')) {
                var realIdx = allData.indexOf(filteredData[idx]);
                allData.splice(realIdx, 1);
                filteredData.splice(idx, 1);
                editRowIndex = null;
                renderTable();
                showToast('删除成功');
            }
        }

        function deleteSelected() {
            var checked = document.querySelectorAll('#tableBody input[type="checkbox"]:checked');
            if (checked.length === 0) {
                showToast('请先勾选要删除的记录', 'error');
                return;
            }
            if (!confirm('确定要删除选中的 ' + checked.length + ' 条记录吗？')) return;

            var toDelete = [];
            checked.forEach(function(cb) {
                toDelete.push(parseInt(cb.dataset.idx));
            });
            toDelete.sort(function(a, b) { return b - a; });
            toDelete.forEach(function(idx) {
                var realIdx = allData.indexOf(filteredData[idx]);
                allData.splice(realIdx, 1);
                filteredData.splice(idx, 1);
            });
            editRowIndex = null;
            renderTable();
            showToast('已删除 ' + toDelete.length + ' 条记录');
        }

        function openAddModal() {
            isAddNew = true;
            document.getElementById('modalTitle').textContent = '新增配置';
            document.getElementById('f_componentCategory').value = '';
            document.getElementById('f_componentType').value = '';
            document.getElementById('f_componentResponsibleParty').value = '';
            document.getElementById('editModal').classList.add('show');
            document.getElementById('modalOverlay').classList.add('show');
        }

        function closeModal() {
            document.getElementById('editModal').classList.remove('show');
            document.getElementById('modalOverlay').classList.remove('show');
        }

        function submitForm() {
            var category = document.getElementById('f_componentCategory').value;
            var type = document.getElementById('f_componentType').value;
            var party = document.getElementById('f_componentResponsibleParty').value.trim();

            if (!category || !type || !party) {
                showToast('请填写必填字段', 'error');
                return;
            }

            var newRow = {
                seqNo: allData.length + 1,
                componentCategory: category,
                componentType: type,
                componentResponsibleParty: party,
                createDate: formatDate(new Date()),
                updateDate: formatDate(new Date()),
                updatedBy: '当前用户'
            };

            allData.unshift(newRow);
            filteredData = allData.slice();
            editRowIndex = null;
            closeModal();
            renderTable();
            showToast('新增成功');
        }

        function saveData() {
            showToast('数据已保存');
        }

        function exportData() {
            var headers = tableFields.map(function(f) { return f.name; });
            var csv = '\ufeff' + headers.join('\t') + '';
            filteredData.forEach(function(row) {
                var values = tableFields.map(function(f) {
                    var v = row[f.field];
                    return v !== undefined && v !== null ? v : '';
                });
                csv += values.join('\t') + '';
            });
            var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '组件责任方配置_' + formatDate(new Date()).split(' ')[0] + '.csv';
            link.click();
            showToast('导出成功');
        }

        function showToast(message, type) {
            type = type || 'success';
            var toast = document.getElementById('toast');
            toast.querySelector('.toast-icon').textContent = type === 'success' ? '✓' : '✕';
            toast.querySelector('.toast-message').textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(function() { toast.classList.remove('show'); }, 2500);
        }

        // 初始化
        generateMockData();
        renderTable();

        // 自定义列配置
        var fieldDefs = tableFields.map(function(f) {
            return { field: f.field, name: f.name, visible: true, leftSticky: f.field === 'componentCategory' };
        });
        var currentColumnConfig = fieldDefs.map(function(f) { return Object.assign({}, f); });

        function openColumnConfig() { ColumnConfigTransfer.open(); }

        ColumnConfigTransfer.init(
            fieldDefs,
            function(newDefs) {
                currentColumnConfig = newDefs.map(function(f) { return Object.assign({}, f); });
                renderTable();
            },
            function() {
                currentColumnConfig = fieldDefs.map(function(f) { return Object.assign({}, f); });
                renderTable();
            },
            function(savedDefs) {
                currentColumnConfig = savedDefs.map(function(f) { return Object.assign({}, f); });
                try { localStorage.setItem('C3_columnConfig', JSON.stringify(savedDefs)); } catch(e) {}
                renderTable();
            }
        );
// 页签导航配置
        var TAB_NAV_CONFIG = {
            '首页': { url: '../index.html' },
            '工单齐套明细': { url: 'M1-kit-details.html' },
            '工单组件信息': { url: 'M2-wo-details.html' },
            '物料缺料明细': { url: 'M3-material-details.html' },
            '齐套规则配置': { url: 'C1-config-rules.html' },
            '工单优先级维护': { url: 'C2-priority.html' },
            '组件责任方配置': { url: 'C3-responsible-party.html' },
            '供给PO信息': { url: 'T1-po-report.html' },
            '供给PR信息': { url: 'T2-pr-info.html' },
            '供给WO信息': { url: 'wo-supply.html' },
            '齐套计算': { url: '../index.html' },
        };
        TabManager.init(TAB_NAV_CONFIG);
    </script>
</body>
</html>
