<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T2 PR信息表</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <style>
        :root { --primary: #1890ff; --border: #d9d9d9; --bg: #f5f7fa; --text: #262626; --success: #52c41a; --danger: #ff4d4f; --warning: #fa8c16; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; color: var(--text); overflow: hidden; }
        .app-header { height: 40px; background: #001529; display: flex; align-items: center; padding: 0 12px; color: white; }
        .app-logo { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .app-logo-icon { width: 24px; height: 24px; background: var(--primary); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .app-nav { display: flex; gap: 16px; margin-left: 24px; }
        .app-nav a { color: rgba(255,255,255,0.65); text-decoration: none; font-size: 11px; padding: 4px 0; border-bottom: 2px solid transparent; }
        .app-nav a:hover, .app-nav a.active { color: white; border-bottom-color: var(--primary); }
        .page-container { height: calc(100vh - 40px); display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
        .page-toolbar { height: 38px; padding: 0 8px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .toolbar-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .toolbar-title::before { content: ''; width: 3px; height: 14px; background: var(--primary); border-radius: 2px; }
        .toolbar-actions { display: flex; gap: 6px; margin-left: auto; }
        .query-bar { padding: 2px 0; background: white; display: flex; flex-wrap: wrap; gap: 0; align-items: center; flex-shrink: 0; font-size: 0; }
        .query-item { display: inline-flex; align-items: center; font-size: 11px; margin: 0; padding: 0; }
        .query-item input, .query-item select { height: 22px; width: 85px; border: 1px solid var(--border); border-radius: 3px; padding: 0 3px; font-size: 11px; margin: 0; }
        .query-item input[type="date"] { width: 80px; }
        .query-item input:focus, .query-item select:focus { border-color: var(--primary); outline: none; }
        .query-label { font-size: 11px; color: #595959; white-space: nowrap; margin: 0; padding: 0 2px 0 0; }
        .stat-cards { padding: 3px 8px; background: white; border-bottom: 1px solid var(--border); display: flex; gap: 4px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }
        .btn { padding: 4px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); background: white; color: var(--text); height: 26px; display: inline-flex; align-items: center; gap: 4px; font-weight: 500; white-space: nowrap; }
        .btn:hover { background: #f5f5f5; }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: white; }
        .btn-primary:hover { background: #40a9ff; }
        .btn-success { background: var(--success); border-color: var(--success); color: white; }
        .btn-success:hover { background: #73d13d; }
        .table-container { flex: 1; min-height: 0; padding: 8px 16px 0; display: flex; flex-direction: column; overflow: hidden; }
        .table-wrapper { flex: 1; min-height: 0; background: white; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; display: flex; flex-direction: column; }
        .table-scroll { flex: 1; min-height: 0; overflow: auto; }
        .data-table { font-size: 11px; border-collapse: separate; border-spacing: 0; width: 100%; min-width: 100%; }
        .data-table th, .data-table td { padding: 6px 10px; border: 1px solid var(--border); text-align: left; white-space: nowrap; }
        .data-table thead th { position: sticky; top: 0; z-index: 11; font-weight: 600; border-bottom: 2px solid var(--border); background: linear-gradient(to bottom, #fafafa, #f0f0f0); }
        .data-table tbody tr:hover td { background: #e6f7ff; }
        .col-check { width: 36px; text-align: center; position: sticky; left: 0; z-index: 6; background: #fafafa; }
        .data-table thead th.col-check { z-index: 14; background: linear-gradient(to bottom, #fafafa, #f0f0f0); }
        .col-check input { width: 14px; height: 14px; accent-color: var(--primary); }
        .col-left-sticky { background: #fffbe6; position: sticky; left: 36px; z-index: 6; min-width: 100px; }
        .data-table thead th.col-left-sticky { z-index: 13; background: linear-gradient(to bottom, #fffbe6, #fff5c2); }
        .col-right-sticky { background: #f6ffed; position: sticky; right: 0; z-index: 7; min-width: 80px; border-left: 2px solid #b7eb8f; }
        .data-table thead th.col-right-sticky { z-index: 14; background: linear-gradient(to bottom, #f6ffed, #d9f7be); border-left: 2px solid #b7eb8f; }
        .link { color: var(--primary); cursor: pointer; text-decoration: none; font-weight: 500; }
        .link:hover { text-decoration: underline; }
        .badge { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 600; }
        .badge-success { background: #f6ffed; color: var(--success); border: 1px solid #b7eb8f; }
        .badge-warning { background: #fffbe6; color: var(--warning); border: 1px solid #ffd666; }
        .badge-danger { background: #fff2f0; color: var(--danger); border: 1px solid #ffccc7; }
        .badge-info { background: #e6f7ff; color: var(--primary); border: 1px solid #91d5ff; }
        .table-footer { height: 36px; padding: 0 12px; background: white; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 11px; flex-shrink: 0; }
        .pagination { display: flex; align-items: center; gap: 6px; }
        .page-info { color: #8c8c8c; padding: 0 8px; }
        .toast { position: fixed; top: 60px; right: 16px; padding: 8px 14px; background: white; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 8px; z-index: 2000; font-size: 11px; transform: translateX(120%); transition: transform 0.2s; }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }
        .toast-icon { font-size: 14px; }
        .toast.success .toast-icon { color: var(--success); }
        .toast.error .toast-icon { color: var(--danger); }
    </style>
</head>
<body>
    <div class="toast" id="toast"><span class="toast-icon"></span><span class="toast-message"></span></div>
    <header class="app-header">
        <div class="app-logo"><div class="app-logo-icon">📦</div>工单齐套管理系统</div>
        <nav class="app-nav">
            <a href="../../index.html">首页</a>
            <a href="../config/index.html">配置管理</a>
            <a href="../business/index.html">业务查询</a>
            <a href="index.html" class="active">供给信息</a>
        </nav>
    </header>
    <div class="page-container">
        <div class="page-toolbar">
            <span class="toolbar-title">T2 PR信息表</span>
            <div class="toolbar-actions">
                <button class="btn" onclick="exportData()">📥 导出</button>
                <button class="btn btn-primary" onclick="doSearch()">🔍 查询</button>
            </div>
        </div>
        <div class="query-bar">
            <div class="query-item"><span class="query-label">工单号</span><input type="text" id="workOrderNo" placeholder="多条件逗号分隔"></div>
            <div class="query-item"><span class="query-label">料号</span><input type="text" id="materialCode" placeholder="多条件逗号分隔"></div>
            <div class="query-item"><span class="query-label">PR号</span><input type="text" id="prNo" placeholder="多条件逗号分隔"></div>
            <div class="query-item"><span class="query-label">申请人</span><input type="text" id="requester" placeholder="多条件逗号分隔"></div>
            <div class="query-item"><span class="query-label">需求日期</span><input type="date" id="requiredDate"></div>
            <div class="query-item"><span class="query-label">状态</span><select id="prStatus"><option value="">全部</option><option>待审批</option><option>已审批</option><option>已转PO</option><option>已关闭</option></select></div>
        </div>
        <div class="table-container">
            <div class="table-wrapper">
                <div class="table-scroll">
                    <table class="data-table" id="dataTable">
                        <thead id="tableHead"></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
                <div class="table-footer">
                    <div>每页 <select id="pageSizeSelect" onchange="changePageSize()" style="height:22px;border:1px solid var(--border);border-radius:3px;padding:0 4px;font-size:11px;"><option value="20">20</option><option value="50" selected>50</option><option value="100">100</option></select> 条</div>
                    <div>共 <strong id="totalCount">0</strong> 条</div>
                    <div class="pagination">
                        <button class="btn" onclick="prevPage()">◀ 上一页</button>
                        <span class="page-info"><span id="currentPage">1</span> / <span id="totalPages">1</span></span>
                        <button class="btn" onclick="nextPage()">下一页 ▶</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        var prFieldDefs = [
            {field:'seqNo',name:'序号',visible:true,fixedLeft:true},
            {field:'prNo',name:'PR号',visible:true,isLink:true},
            {field:'workOrderNo',name:'工单号',visible:true,isLink:true,fixedLeft:true},
            {field:'materialCode',name:'料号',visible:true},
            {field:'materialName',name:'物料名称',visible:true},
            {field:'prQty',name:'PR数量',visible:true,type:'NUM'},
            {field:'unit',name:'单位',visible:true},
            {field:'requiredDate',name:'需求日期',visible:true},
            {field:'promisedDate',name:'承诺日期',visible:true},
            {field:'requester',name:'申请人',visible:true},
            {field:'department',name:'部门',visible:true},
            {field:'prStatus',name:'PR状态',visible:true},
            {field:'purchaseType',name:'采购类型',visible:true},
            {field:'supplierSuggestion',name:'供应商建议',visible:true},
            {field:'estimatedPrice',name:'预估单价',visible:true,type:'NUM'},
            {field:'estimatedAmount',name:'预估金额',visible:true,type:'NUM'},
            {field:'urgencyLevel',name:'紧急程度',visible:true},
            {field:'createdBy',name:'创建人',visible:true},
            {field:'createdDate',name:'创建日期',visible:true},
            {field:'operations',name:'操作',visible:true,fixedRight:true}
        ];

        var allData, filteredData, currentPage, pageSize;

        function init() {
            pageSize = 50;
            currentPage = 1;
            generateSampleData();
            doSearch();
        }

        function generateSampleData() {
            var materials = [
                {code:'MTR-001',name:'电容 10uF 25V'}, {code:'MTR-002',name:'电阻 10K 1%'}, {code:'MTR-003',name:'IC STM32F103'},
                {code:'MTR-004',name:'晶振 8MHz'}, {code:'MTR-005',name:'连接器 J1'}
            ];
            var departments = ['研发部', '生产部', '品质部', '工程部'];
            var requesters = ['张三', '李四', '王五', '赵六', '钱七'];
            var statuses = ['待审批', '已审批', '已转PO', '已关闭'];
            var purchaseTypes = ['正常采购', '紧急采购', '样件采购'];
            allData = [];
            for (var i = 1; i <= 80; i++) {
                var mat = materials[Math.floor(Math.random() * materials.length)];
                var prQty = Math.floor(Math.random() * 300) + 20;
                allData.push({
                    seqNo: i,
                    prNo: 'PR-2024-' + String(i).padStart(6, '0'),
                    workOrderNo: 'WO-2024-' + String(Math.floor(Math.random() * 1000)).padStart(6, '0'),
                    materialCode: mat.code,
                    materialName: mat.name,
                    prQty: prQty,
                    unit: 'PCS',
                    requiredDate: new Date(2024, Math.floor(Math.random() * 12), Math.floor(Math.random() * 28) + 1).toISOString().split('T')[0],
                    promisedDate: new Date(2024, Math.floor(Math.random() * 12), Math.floor(Math.random() * 28) + 1).toISOString().split('T')[0],
                    requester: requesters[Math.floor(Math.random() * requesters.length)],
                    department: departments[Math.floor(Math.random() * departments.length)],
                    prStatus: statuses[Math.floor(Math.random() * statuses.length)],
                    purchaseType: purchaseTypes[Math.floor(Math.random() * purchaseTypes.length)],
                    supplierSuggestion: '供应商' + String(Math.floor(Math.random() * 3) + 1),
                    estimatedPrice: (Math.random() * 50 + 1).toFixed(2),
                    estimatedAmount: 0,
                    urgencyLevel: ['普通', '紧急', '特急'][Math.floor(Math.random() * 3)],
                    createdBy: requesters[Math.floor(Math.random() * requesters.length)],
                    createdDate: new Date(2024, Math.floor(Math.random() * 12), Math.floor(Math.random() * 28) + 1).toISOString().split('T')[0]
                });
            }
            allData.forEach(function(d){ d.estimatedAmount = (d.prQty * d.estimatedPrice).toFixed(2); });
            filteredData = allData.slice();
        }

        function buildHeaderHtml() {
            var html = '<tr><th class="col-check"><input type="checkbox" onchange="toggleAll(this)"></th>';
            prFieldDefs.forEach(function(col) {
                var thClass = '';
                if (col.fixedLeft) thClass = 'col-left-sticky';
                else if (col.fixedRight) thClass = 'col-right-sticky';
                html += '<th class="' + thClass + '">' + col.name + '</th>';
            });
            html += '</tr>';
            return html;
        }

        function buildBodyHtml() {
            var start = (currentPage - 1) * pageSize;
            var end = Math.min(start + pageSize, filteredData.length);
            var html = '';
            for (var i = start; i < end; i++) {
                var item = filteredData[i];
                html += '<tr><td class="col-check"><input type="checkbox"></td>';
                prFieldDefs.forEach(function(col) {
                    var value = item[col.field];
                    var tdClass = col.fixedLeft ? 'col-left-sticky' : (col.fixedRight ? 'col-right-sticky' : '');
                    if (col.field === 'prStatus') {
                        var badgeClass = value === '已转PO' ? 'badge-success' : (value === '已审批' ? 'badge-info' : (value === '已关闭' ? '' : 'badge-warning'));
                        html += '<td class="' + tdClass + '"><span class="badge ' + badgeClass + '">' + value + '</span></td>';
                    } else if (col.field === 'urgencyLevel') {
                        var badgeClass = value === '特急' ? 'badge-danger' : (value === '紧急' ? 'badge-warning' : '');
                        html += '<td class="' + tdClass + '"><span class="badge ' + badgeClass + '">' + value + '</span></td>';
                    } else if (col.isLink) {
                        html += '<td class="' + tdClass + '"><a class="link" onclick="viewDetail(\'' + item.prNo + '\')">' + value + '</a></td>';
                    } else if (col.field === 'operations') {
                        html += '<td class="' + tdClass + '"><a class="link" onclick="viewDetail(\'' + item.prNo + '\')">详情</a></td>';
                    } else {
                        html += '<td class="' + tdClass + '">' + (value !== undefined && value !== null ? value : '') + '</td>';
                    }
                });
                html += '</tr>';
            }
            return html;
        }

        function renderTable() {
            document.getElementById('tableHead').innerHTML = buildHeaderHtml();
            document.getElementById('tableBody').innerHTML = buildBodyHtml();
            document.getElementById('totalCount').textContent = filteredData.length;
            document.getElementById('totalPages').textContent = Math.ceil(filteredData.length / pageSize) || 1;
            document.getElementById('currentPage').textContent = currentPage;
        }

        function showToast(message, type) {
            var toast = document.getElementById('toast');
            toast.querySelector('.toast-message').textContent = message;
            toast.querySelector('.toast-icon').textContent = type === 'success' ? '✓' : '✕';
            toast.className = 'toast ' + type + ' show';
            setTimeout(function() { toast.classList.remove('show'); }, 2500);
        }

        function doSearch() {
            var woNo = document.getElementById('workOrderNo').value.trim();
            var materialCode = document.getElementById('materialCode').value.trim();
            var prNo = document.getElementById('prNo').value.trim();
            var requester = document.getElementById('requester').value.trim();
            var requiredDate = document.getElementById('requiredDate').value;
            var prStatus = document.getElementById('prStatus').value;

            filteredData = allData.filter(function(item) {
                if (woNo && item.workOrderNo.indexOf(woNo) === -1) return false;
                if (materialCode && item.materialCode.indexOf(materialCode) === -1) return false;
                if (prNo && item.prNo.indexOf(prNo) === -1) return false;
                if (requester && item.requester.indexOf(requester) === -1) return false;
                if (requiredDate && item.requiredDate !== requiredDate) return false;
                if (prStatus && item.prStatus !== prStatus) return false;
                return true;
            });
            currentPage = 1;
            renderTable();
            showToast('查询完成，共 ' + filteredData.length + ' 条记录', 'success');
        }

        function viewDetail(prNo) {
            showToast('查看PR详情: ' + prNo, 'success');
        }

        function exportData() {
            var headers = prFieldDefs.map(function(c){return c.name;});
            var csv = headers.join(',') + '\n';
            filteredData.forEach(function(item) {
                var row = prFieldDefs.map(function(col) { var val = item[col.field]; return val !== undefined && val !== null ? val : ''; });
                csv += row.join(',') + '\n';
            });
            var blob = new Blob(['\ufeff' + csv], {type: 'text/csv;charset=utf-8;'});
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'PR信息表_' + new Date().toISOString().split('T')[0] + '.csv';
            link.click();
            showToast('导出成功，共 ' + filteredData.length + ' 条数据', 'success');
        }

        function changePageSize() { pageSize = parseInt(document.getElementById('pageSizeSelect').value); currentPage = 1; renderTable(); }
        function prevPage() { if(currentPage > 1) { currentPage--; renderTable(); } }
        function nextPage() { if(currentPage < Math.ceil(filteredData.length / pageSize)) { currentPage++; renderTable(); } }
        function toggleAll(cb) { document.querySelectorAll('#tableBody input[type="checkbox"]').forEach(function(c){ c.checked = cb.checked; }); }

        init();
    </script>
</body>
</html>
